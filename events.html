<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Campus Life Super App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- NAVIGATION HEADER -->
    <!-- Purpose: Global navigation bar available on all pages for seamless navigation -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">Campus Life Super App</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
                        <li class="nav-item"><a class="nav-link" href="dining.html">Dining</a></li>
                        <li class="nav-item"><a class="nav-link" href="student-resources.html">Resources</a></li>
                        <li class="nav-item"><a class="nav-link" href="weather.html">Weather</a></li>
                        <li class="nav-item"><a class="nav-link" href="news.html">News</a></li>
                        <li class="nav-item"><a class="nav-link" href="map.html">Map</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <!-- PAGE TITLE AND DESCRIPTION -->
        <!-- Purpose: Provide context and welcome for Events page -->
        <div class="mb-5">
            <h1 class="text-center mb-3">Campus Events</h1>
            <p class="text-center lead text-muted">Discover and RSVP to campus events happening near you</p>
        </div>

        <!-- SEARCH AND FILTER BAR -->
        <!-- Purpose: Allow users to search for specific events and filter by category -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="form-control" 
                        id="event-search" 
                        placeholder="Search for events..."
                        aria-label="Search events"
                    >
                    <button class="btn btn-primary" type="button" id="search-btn">Search</button>
                </div>
            </div>
            <div class="col-md-4">
                <select class="form-select" id="category-filter" aria-label="Filter by category">
                    <option value="">All Categories</option>
                    <option value="academic">Academic</option>
                    <option value="social">Social</option>
                    <option value="sports">Sports</option>
                    <option value="cultural">Cultural</option>
                </select>
            </div>
        </div>

        <!-- EVENT CARDS LIST -->
        <!-- Purpose: Display events in a card grid format for easy browsing -->
        <div class="row" id="events-container">
            <!-- Event cards will be dynamically loaded here by events.js -->
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading events...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- EVENT DETAIL MODAL -->
    <!-- Purpose: Display detailed event information when user clicks on an event card -->
    <!-- Features: Event details, RSVP button, close button -->
    <div class="modal fade" id="eventDetailModal" tabindex="-1" aria-labelledby="eventDetailLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="eventDetailLabel">Event Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modal-body-content">
                    <!-- Event details will be dynamically inserted here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="rsvp-btn">RSVP</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <!-- Purpose: Provide consistent footer across all pages -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p>&copy; 2024 Campus Life Super App. All rights reserved.</p>
        </div>
    </footer>

    <!-- BOOTSTRAP AND APP SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
